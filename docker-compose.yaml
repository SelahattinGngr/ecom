services:
  app:
    build: .
    container_name: ${TENANT_NAME}_app
    restart: unless-stopped
    ports:
      - "${HOST_PORT}:5353"
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: test
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./app/uploads:/app/assets/public/products
      - ./app/logs:/app/logs
    networks:
      - ecom-net
    deploy:
      resources:
        limits:
          cpus: "1.2"
          memory: 2500M

  postgres:
    image: postgres:18-alpine
    container_name: ${TENANT_NAME}_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB_NAME}
      POSTGRES_USER: ${POSTGRES_DB_USER}
      POSTGRES_PASSWORD: ${POSTGRES_DB_PASSWORD}
    volumes:
      - ./app/db-data:/var/lib/postgresql
    command: postgres -c shared_buffers=128MB -c max_connections=200
    networks:
      - ecom-net
    ports:
      - "5432:5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_DB_USER} -d ${POSTGRES_DB_NAME}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

  redis:
    image: redis:8-alpine
    container_name: ${TENANT_NAME}_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 128mb --maxmemory-policy volatile-lru
    volumes:
      - ./app/redis-data:/data
    networks:
      - ecom-net
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.2"
          memory: 256M

  nginx:
    image: nginx:1.27-alpine
    container_name: ${TENANT_NAME}_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/templates:/etc/nginx/templates
      - ./app/certbot/conf:/etc/letsencrypt
      - ./app/certbot/www:/var/www/certbot
    environment:
      - DOMAIN_NAME=${DOMAIN_NAME}
    depends_on:
      - app
    networks:
      - ecom-net
    deploy:
      resources:
        limits:
          cpus: "0.1"
          memory: 128M

  certbot:
    image: certbot/certbot
    container_name: ${TENANT_NAME}_certbot
    volumes:
      - ./app/certbot/conf:/etc/letsencrypt
      - ./app/certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --quiet; sleep 12h & wait $${!}; done;'"

networks:
  ecom-net:
    driver: bridge
