services:
  app:
    build: .
    container_name: ${TENANT_NAME}_app
    restart: unless-stopped
    ports:
      - "${HOST_PORT}:5353"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./uploads:/app/assets/public/products
      - ./logs:/app/logs
    networks:
      - ecom-net
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 600M
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  postgres:
    image: postgres:latest
    container_name: ${TENANT_NAME}_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB_NAME}
      POSTGRES_USER: ${POSTGRES_DB_USER}
      POSTGRES_PASSWORD: ${POSTGRES_DB_PASSWORD}
    volumes:
      - ./db-data:/var/lib/postgresql
    networks:
      - ecom-net
    ports:
      - "5432:5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_DB_USER} -d ${POSTGRES_DB_NAME}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  redis:
    image: redis:latest
    container_name: ${TENANT_NAME}_redis
    restart: unless-stopped
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - ./redis-data:/data
    networks:
      - ecom-net
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 150M

networks:
  ecom-net:
    driver: bridge
