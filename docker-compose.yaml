services:
  postgres:
    image: postgres:latest
    container_name: ecom-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB_NAME}
      POSTGRES_USER: ${POSTGRES_DB_USER}
      POSTGRES_PASSWORD: ${POSTGRES_DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql
    networks:
      - ecom-net
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_DB_USER} -d ${POSTGRES_DB_NAME} -h localhost",
        ]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:latest
    container_name: ecom-redis-cache
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - ecom-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  app:
    build: .
    container_name: ecom-app
    ports:
      - "5353:5353"
    environment:
      SERVER_PORT: ${SERVER_PORT}

      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_DB_NAME: ${POSTGRES_DB_NAME}
      POSTGRES_DB_USER: ${POSTGRES_DB_USER}
      POSTGRES_DB_PASSWORD: ${POSTGRES_DB_PASSWORD}

      JWT_ACCESS_SECRET_KEY: ${JWT_ACCESS_SECRET_KEY}
      JWT_REFRESH_SECRET_KEY: ${JWT_REFRESH_SECRET_KEY}
      JWT_ACCESS_TOKEN_EXPIRATION_MS: ${JWT_ACCESS_TOKEN_EXPIRATION_MS}
      JWT_REFRESH_TOKEN_EXPIRATION_MS: ${JWT_REFRESH_TOKEN_EXPIRATION_MS}

      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}

      GMAIL_USERNAME: ${GMAIL_USERNAME}
      GMAIL_PASSWORD: ${GMAIL_PASSWORD}

      CLIENT_FRONTEND_URL: ${CLIENT_FRONTEND_URL}
      CLIENT_EMAIL_VERIFICATION_PATH: ${CLIENT_EMAIL_VERIFICATION_PATH}
      CLIENT_CORS_ALLOWED_ORIGINS: ${CLIENT_CORS_ALLOWED_ORIGINS}

      PAYMENT_ACTIVE_PROVIDER: ${PAYMENT_ACTIVE_PROVIDER}

      PAYMENT_IYZICO_API_KEY: ${PAYMENT_IYZICO_API_KEY}
      PAYMENT_IYZICO_SECRET_KEY: ${PAYMENT_IYZICO_SECRET_KEY}
      PAYMENT_IYZICO_BASE_URL: ${PAYMENT_IYZICO_BASE_URL}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads:/app/assets/public/products
    networks:
      - ecom-net

volumes:
  postgres-data:
  redis-data:
  uploads:

networks:
  ecom-net:
    driver: bridge
