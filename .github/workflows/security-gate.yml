name: Security Gate — PR Check

on:
  pull_request:
    branches: ["main", "master", "develop"]

permissions:
  contents: read
  security-events: write
  pull-requests: write

jobs:
  build:
    name: Build & Compile
    runs-on: ubuntu-latest
    # Dependabot PR'larında build atla — sadece action versiyonu günceller, kod değişmez
    if: github.actor != 'dependabot[bot]'

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Build
        run: ./mvnw clean package -DskipTests -B -q

      - name: Cache build artifacts
        uses: actions/cache@v5
        with:
          path: target/*.jar
          key: build-${{ github.sha }}

  dependency-check:
    name: CVE Check (OWASP)
    runs-on: ubuntu-latest
    needs: build
    if: |
      github.actor != 'dependabot[bot]' &&
      (contains(github.event.pull_request.changed_files, 'pom.xml') ||
      github.event_name == 'workflow_dispatch')

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: OWASP Dependency Check
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: |
          ./mvnw org.owasp:dependency-check-maven:check \
            -DnvdApiKey=${NVD_API_KEY} \
            -DfailBuildOnCVSS=9 \
            -Dformat=HTML \
            -DsuppressionFile=.github/owasp-suppressions.xml \
            -B -q

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: owasp-pr-report
          path: target/dependency-check-report.html
          retention-days: 7

  secret-scan:
    name: Secret Leak Check
    runs-on: ubuntu-latest
    needs: build
    if: github.actor != 'dependabot[bot]'

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Gitleaks scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  security-gate:
    name: ✅ Security Gate
    runs-on: ubuntu-latest
    needs: [build, secret-scan]
    if: always()

    steps:
      - name: Evaluate gate
        run: |
          # Dependabot PR'larında gate'i otomatik geçir
          if [[ "${{ github.actor }}" == "dependabot[bot]" ]]; then
            echo "✅ Dependabot PR — security gate skipped"
            exit 0
          fi
          if [[ "${{ needs.build.result }}" != "success" ]]; then
            echo "❌ Build failed"
            exit 1
          fi
          if [[ "${{ needs.secret-scan.result }}" == "failure" ]]; then
            echo "❌ Secret leak detected — PR blocked"
            exit 1
          fi
          echo "✅ Security gate passed"
