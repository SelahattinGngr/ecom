server.port=${SERVER_PORT:5353}

# --- POSTGRESQL ---
spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST:postgres}:${POSTGRES_PORT:5432}/${POSTGRES_DB_NAME}
spring.datasource.username=${POSTGRES_DB_USER}
spring.datasource.password=${POSTGRES_DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# --- REDIS ---
spring.data.redis.host=${REDIS_HOST:redis}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD}

# --- JWT ---
selahattin.dev.jwt.access-secret-key=${JWT_ACCESS_SECRET_KEY}
selahattin.dev.jwt.refresh-secret-key=${JWT_REFRESH_SECRET_KEY}
selahattin.dev.jwt.access-token-expiration-ms=${JWT_ACCESS_TOKEN_EXPIRATION_MS}
selahattin.dev.jwt.refresh-token-expiration-ms=${JWT_REFRESH_TOKEN_EXPIRATION_MS}

# --- SPRING MAIL ---
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${GMAIL_USERNAME}
spring.mail.password=${GMAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=3000
spring.mail.properties.mail.smtp.writetimeout=5000

# --- CLIENT ---
selahattin.dev.client.backend-url=${CLIENT_BACKEND_URL}
selahattin.dev.client.frontend-url=${CLIENT_FRONTEND_URL}
selahattin.dev.client.email-verification-path=${CLIENT_EMAIL_VERIFICATION_PATH}
selahattin.dev.client.cors-allowed-origins=${CLIENT_CORS_ALLOWED_ORIGINS}

# --- PAYMENT ---
selahattin.dev.payment.active-provider=${PAYMENT_ACTIVE_PROVIDER:IYZICO}
selahattin.dev.payment.stripe.api-key=${PAYMENT_STRIPE_API_KEY}
selahattin.dev.payment.stripe.publishable-key=${PAYMENT_STRIPE_PUB_KEY}
selahattin.dev.payment.stripe.webhook-secret=${PAYMENT_STRIPE_WEBHOOK}
selahattin.dev.payment.iyzico.api-key=${PAYMENT_IYZICO_API_KEY}
selahattin.dev.payment.iyzico.secret-key=${PAYMENT_IYZICO_SECRET_KEY}
selahattin.dev.payment.iyzico.base-url=${PAYMENT_IYZICO_BASE_URL}
selahattin.dev.payment.iyzico.callback-url=${selahattin.dev.client.backend-url}/api/v1/webhooks/payments/iyzico

# --- PROD KISITLAMALARI ---
app.dev-tools.enabled=false
springdoc.swagger-ui.enabled=false
springdoc.api-docs.enabled=false
app.cookie.secure=true

# Nginx arkasında gerçek client IP (S-07)
server.forward-headers-strategy=framework
