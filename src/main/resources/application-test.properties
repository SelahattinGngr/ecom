server.port=${SERVER_PORT:5353}

# --- POSTGRESQL ---
spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB_NAME}
spring.datasource.username=${POSTGRES_DB_USER}
spring.datasource.password=${POSTGRES_DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# --- REDIS ---
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT}

# --- JWT CONFIGURATION ---
selahattin.dev.jwt.access-secret-key=${JWT_ACCESS_SECRET_KEY}
selahattin.dev.jwt.refresh-secret-key=${JWT_REFRESH_SECRET_KEY} 
selahattin.dev.jwt.access-token-expiration-ms=${JWT_ACCESS_TOKEN_EXPIRATION_MS}
selahattin.dev.jwt.refresh-token-expiration-ms=${JWT_REFRESH_TOKEN_EXPIRATION_MS}

# --- SPRING MAIL ---
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${GMAIL_USERNAME}
spring.mail.password=${GMAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=3000
spring.mail.properties.mail.smtp.writetimeout=5000

# --- CLIENT PROPERTIES ---
selahattin.dev.client.backend-url=${CLIENT_BACKEND_URL:http://localhost:5353}
selahattin.dev.client.frontend-url=${CLIENT_FRONTEND_URL:http://localhost:3000}
selahattin.dev.client.email-verification-path=${CLIENT_EMAIL_VERIFICATION_PATH}
selahattin.dev.client.cors-allowed-origins=${CLIENT_CORS_ALLOWED_ORIGINS}

# ==========================================
# PAYMENT CONFIGURATION (ENV DRIVEN)
# ==========================================
selahattin.dev.payment.active-provider=${PAYMENT_ACTIVE_PROVIDER:MOCK}

# --- STRIPE ---
selahattin.dev.payment.stripe.api-key=${PAYMENT_STRIPE_API_KEY:dummy_stripe_key}
selahattin.dev.payment.stripe.publishable-key=${PAYMENT_STRIPE_PUB_KEY:dummy_stripe_pub}
selahattin.dev.payment.stripe.webhook-secret=${PAYMENT_STRIPE_WEBHOOK:dummy_stripe_wh}

# --- IYZICO ---
selahattin.dev.payment.iyzico.api-key=${PAYMENT_IYZICO_API_KEY:dummy_iyzico_api}
selahattin.dev.payment.iyzico.secret-key=${PAYMENT_IYZICO_SECRET_KEY:dummy_iyzico_secret}
selahattin.dev.payment.iyzico.base-url=${PAYMENT_IYZICO_BASE_URL:https://sandbox-api.iyzipay.com}
selahattin.dev.payment.iyzico.callback-url=${selahattin.dev.client.backend-url}/api/v1/webhooks/payments/iyzico

# --- GARANTI ---
selahattin.dev.payment.garanti.merchant-id=${PAYMENT_GARANTI_MERCHANT_ID:dummy}
selahattin.dev.payment.garanti.merchant-password=${PAYMENT_GARANTI_MERCHANT_PASS:dummy}
selahattin.dev.payment.garanti.terminal-id=${PAYMENT_GARANTI_TERMINAL_ID:dummy}
selahattin.dev.payment.garanti.store-key=${PAYMENT_GARANTI_STORE_KEY:dummy}
selahattin.dev.payment.garanti.provision-user=${PAYMENT_GARANTI_PROV_USER:dummy}
selahattin.dev.payment.garanti.provision-password=${PAYMENT_GARANTI_PROV_PASS:dummy}
selahattin.dev.payment.garanti.base-url=${PAYMENT_GARANTI_BASE_URL:https://sanalposprov.garanti.com.tr/servlet/gt3dengine}
selahattin.dev.payment.garanti.callback-url=${selahattin.dev.client.backend-url}/api/v1/webhooks/payments/garanti