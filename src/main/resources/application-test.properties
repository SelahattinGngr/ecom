server.port=${SERVER_PORT:5353}

# --- TOMCAT OPTİMİZASYONU ---
# İstekleri anlık işleyen aktif "worker thread" sınırı. 2 vCPU için 200 idealdir; daha fazlası CPU'yu "context switch" ile boğar.
server.tomcat.threads.max=200
# Trafik yokken bile hazır kıta bekletilen thread sayısı. Anlık trafik sıçramalarında (spike) anında yanıt vermeyi sağlar.
server.tomcat.threads.min-spare=20
# İçerideki tüm kapasite dolduğunda işletim sistemi (OS) seviyesinde bekletilen dış kuyruk. Bu sınır da aşılırsa client "Connection Refused" hatası alır.
server.tomcat.accept-count=500
# Tomcat'in aynı anda açık tutabileceği (ancak hepsinin aktif işlem yapması gerekmeyen) fiziksel TCP bağlantı limiti.
server.tomcat.max-connections=1000

# Dev araçları (Swagger + tam Actuator)
app.dev-tools.enabled=true
app.cookie.secure=false
management.endpoints.web.exposure.include=health,info,metrics,mappings
management.endpoint.health.show-details=always
springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true

# --- POSTGRESQL ---
spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB_NAME}
spring.datasource.username=${POSTGRES_DB_USER}
spring.datasource.password=${POSTGRES_DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# --- REDIS & CONNECTION POOL ---
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.password=${REDIS_PASSWORD}
spring.data.redis.port=${REDIS_PORT}
# Tomcat threads.max ile aynı hizada tutuyoruz ki hiçbir istek havuzda beklemesin
spring.data.redis.lettuce.pool.max-active=50
# Trafik dalgalanmalarına karşı hazır bekleyen bağlantı sayısını artırıyoruz
spring.data.redis.lettuce.pool.max-idle=100
# Düşük trafikte bile 20 bağlantı hazır kıta beklesin
spring.data.redis.lettuce.pool.min-idle=20
# Bekleme süresi 2s olarak kalabilir. Redis 2 saniyede cevap vermiyorsa zaten ölmüştür.
spring.data.redis.lettuce.pool.max-wait=2s

# --- JWT CONFIGURATION ---
selahattin.dev.jwt.access-secret-key=${JWT_ACCESS_SECRET_KEY}
selahattin.dev.jwt.refresh-secret-key=${JWT_REFRESH_SECRET_KEY} 
selahattin.dev.jwt.access-token-expiration-ms=${JWT_ACCESS_TOKEN_EXPIRATION_MS}
selahattin.dev.jwt.refresh-token-expiration-ms=${JWT_REFRESH_TOKEN_EXPIRATION_MS}

# --- SPRING MAIL ---
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${GMAIL_USERNAME}
spring.mail.password=${GMAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=3000
spring.mail.properties.mail.smtp.writetimeout=5000

# --- CLIENT PROPERTIES ---
selahattin.dev.client.backend-url=${CLIENT_BACKEND_URL:http://localhost:5353}
selahattin.dev.client.frontend-url=${CLIENT_FRONTEND_URL:http://localhost:3000}
selahattin.dev.client.email-verification-path=${CLIENT_EMAIL_VERIFICATION_PATH}
selahattin.dev.client.cors-allowed-origins=${CLIENT_CORS_ALLOWED_ORIGINS}

# ==========================================
# PAYMENT CONFIGURATION (ENV DRIVEN)
# ==========================================
selahattin.dev.payment.active-provider=${PAYMENT_ACTIVE_PROVIDER:MOCK}

# --- STRIPE ---
selahattin.dev.payment.stripe.api-key=${PAYMENT_STRIPE_API_KEY:dummy_stripe_key}
selahattin.dev.payment.stripe.publishable-key=${PAYMENT_STRIPE_PUB_KEY:dummy_stripe_pub}
selahattin.dev.payment.stripe.webhook-secret=${PAYMENT_STRIPE_WEBHOOK:dummy_stripe_wh}

# --- IYZICO ---
selahattin.dev.payment.iyzico.api-key=${PAYMENT_IYZICO_API_KEY:dummy_iyzico_api}
selahattin.dev.payment.iyzico.secret-key=${PAYMENT_IYZICO_SECRET_KEY:dummy_iyzico_secret}
selahattin.dev.payment.iyzico.base-url=${PAYMENT_IYZICO_BASE_URL:https://sandbox-api.iyzipay.com}
selahattin.dev.payment.iyzico.callback-url=${selahattin.dev.client.backend-url}/api/v1/webhooks/payments/iyzico